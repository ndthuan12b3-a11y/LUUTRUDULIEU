<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Hóa Đơn - 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --smooth: cubic-bezier(0.4, 0, 0.2, 1); 
            --theme-color: #2563eb; 
            --theme-dark: #1e3a8a;
        }
        
        body { 
            background: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            color: #0f172a; 
            overflow-x: hidden; 
        }

        .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }

        .app-gradient { 
            background-color: var(--theme-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15), transparent 70%);
            transition: background-color 0.6s ease;
            position: relative; 
            border-bottom: 5px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }

        .tab-btn { font-weight: 600; color: rgba(255,255,255,0.7); transition: all 0.4s var(--smooth); }
        .tab-btn.active { background: white; border-radius: 16px; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-weight: 700; }
        #tabTueThien.active { color: #2563eb !important; } 
        #tabHungThinh.active { color: #059669 !important; } 
        #tabPhucAn.active { color: #db2777 !important; }
        
        .luxury-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(25px); border-radius: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 30px 80px -10px rgba(0, 0, 0, 0.05); }
        .link-batch-box { background: white; border: 1px solid #f1f5f9; border-radius: 24px; padding: 1.5rem; margin-bottom: 2rem; position: relative; border-left: 6px solid var(--theme-color); transition: border-color 0.6s ease, box-shadow 0.3s; }
        .link-batch-box:hover { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); }
        
        .btn-luxury-view {
            background: #f8fafc;
            color: var(--theme-color) !important;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 16px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .btn-luxury-view:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1); background: white; }
        
        .invoice-card { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 16px; transition: all 0.2s var(--smooth); margin-bottom: 0.75rem; padding: 1.25rem; width: 100%; display: flex; align-items: flex-start; }
        .invoice-card:hover { transform: translateY(-2px); background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border-color: #e2e8f0; }
        .invoice-content-wrapper { display: flex; align-items: flex-start; gap: 1.25rem; width: 100%; }
        .invoice-text-section { flex: 1; min-width: 0; }
        
        .invoice-name { font-size: 17px; font-weight: 600; word-break: break-word; overflow-wrap: break-word; line-height: 1.4; color: #1e293b; display: block; cursor: pointer; transition: color 0.2s ease; }
        .invoice-name:hover { color: var(--theme-color); }
        
        .btn-add { background: var(--theme-color); border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: background-color 0.6s ease; }
        .dash-item { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: all 0.3s; }
        .timeline-month-header { position: sticky; top: -1px; z-index: 40; background: #f8fafc; padding: 15px 0; border-bottom: 2px dashed #cbd5e1; margin-bottom: 20px; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loadingIndicator" class="fixed inset-0 z-[10000] flex items-center justify-center bg-white">
        <div class="w-16 h-16 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin" style="border-top-color: var(--theme-color);"></div>
    </div>
    
    <div id="toastContainer" class="fixed top-8 right-8 z-[10001] space-y-4 w-80 pointer-events-none"></div>

    <nav class="app-gradient pt-16 pb-28 px-4">
        <div class="max-w-4xl mx-auto flex flex-col items-center relative z-20">
            <h1 class="text-3xl md:text-5xl font-jakarta font-extrabold text-white mb-10 tracking-tight cursor-pointer">NHÀ THUỐC</h1>
            
            <div class="w-full max-w-xl bg-black/20 backdrop-blur-md p-2 rounded-[1.5rem] flex items-center border border-white/10 shadow-xl">
                <button id="tabTueThien" onclick="togglePharmacy('NT Tuệ Thiện', 'TueThien');" class="tab-btn flex-1 py-4 uppercase rounded-[1.2rem] text-[15px] active">Tuệ Thiện <span class="text-[11px] opacity-60 ml-0.5 font-normal">[1]</span></button>
                <button id="tabHungThinh" onclick="togglePharmacy('NT Hưng Thịnh', 'HungThinh');" class="tab-btn flex-1 py-4 uppercase rounded-[1.2rem] text-[15px]">Hưng Thịnh <span class="text-[11px] opacity-60 ml-0.5 font-normal">[2]</span></button>
                <button id="tabPhucAn" onclick="togglePharmacy('NT Phúc An', 'PhucAn');" class="tab-btn flex-1 py-4 uppercase rounded-[1.2rem] text-[15px]">Phúc An <span class="text-[11px] opacity-60 ml-0.5 font-normal">[3]</span></button>
            </div>

            <div class="w-full max-w-xl mt-10 grid grid-cols-3 gap-6 text-white text-center">
                <div class="dash-item p-5 cursor-pointer hover:bg-white/20 transform hover:-translate-y-1 hover:shadow-xl" onclick="showListModal('all')" title="Xem tất cả">
                    <p id="totalCount" class="text-4xl font-jakarta font-black text-white">0</p>
                    <p class="text-[12px] font-semibold uppercase opacity-90 mt-2 tracking-wider">Tổng HĐ 📦</p>
                </div>
                <div class="dash-item p-5 cursor-pointer hover:bg-white/20 transform hover:-translate-y-1 hover:shadow-xl" onclick="showListModal('completed')" title="Xem hóa đơn đã xong">
                    <p id="completedCount" class="text-4xl font-jakarta font-black text-green-300">0</p>
                    <p class="text-[12px] font-semibold uppercase opacity-90 mt-2 tracking-wider">Đã Xong ✅</p>
                </div>
                <div class="dash-item p-5 cursor-pointer hover:bg-white/20 transform hover:-translate-y-1 hover:shadow-xl" onclick="showListModal('pending')" title="Xem hóa đơn còn lại">
                    <p id="pendingCount" class="text-4xl font-jakarta font-black text-orange-200">0</p>
                    <p class="text-[12px] font-semibold uppercase opacity-90 mt-2 tracking-wider">Còn Lại ⏳</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 -mt-20 relative z-30 pb-32">
        <div class="luxury-panel p-6 md:p-10 min-h-[500px]">
            <div class="flex flex-col md:flex-row gap-5 mb-10">
                <div class="relative flex-1">
                    <input type="text" id="mainSearch" oninput="applyFilters()" placeholder="Tìm kiếm nhà cung cấp (Phím F)..." class="w-full pl-14 pr-6 py-4 rounded-[1.5rem] bg-slate-50 border-2 border-transparent focus:bg-white focus:border-slate-300 outline-none font-medium text-[16px] text-slate-800 shadow-inner transition-all">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-xl opacity-50">🔍</span>
                </div>
                <div class="flex bg-slate-50 p-2 rounded-[1.5rem] border border-slate-100 shadow-inner">
                    <button id="filterAll" onclick="changeFilter('all')" class="px-6 py-3 text-[14px] font-bold rounded-xl bg-slate-800 text-white shadow-md transition-all">Tất cả</button>
                    <button id="filterUncompleted" onclick="changeFilter('uncompleted')" class="px-6 py-3 text-[14px] font-bold rounded-xl text-slate-500 transition-all hover:text-slate-800">Chưa xong</button>
                </div>
            </div>
            <div id="invoiceDisplay" class="space-y-6"></div>
        </div>
    </main>

    <div class="fixed bottom-10 right-10 flex flex-col gap-4 items-end z-[9000]">
        <div class="group relative flex items-center">
            <span class="absolute right-full mr-4 px-3.5 py-2 bg-slate-800 text-white text-[13px] font-bold rounded-xl opacity-0 group-hover:opacity-100 transition-all transform translate-x-4 group-hover:translate-x-0 whitespace-nowrap pointer-events-none shadow-xl">Dọn dẹp đã xong <span class="text-yellow-300 ml-1">(Ctrl+X)</span></span>
            <button onclick="cleanupCompleted();" class="w-14 h-14 bg-white border border-slate-200 text-slate-600 rounded-2xl shadow-lg flex items-center justify-center hover:scale-110 active:rotate-12 transition-all text-xl">🧹</button>
        </div>
        <div class="group relative flex items-center">
            <span class="absolute right-full mr-4 px-3.5 py-2 bg-zinc-900 text-white text-[13px] font-bold rounded-xl opacity-0 group-hover:opacity-100 transition-all transform translate-x-4 group-hover:translate-x-0 whitespace-nowrap pointer-events-none shadow-xl">Danh sách đen</span>
            <button onclick="toggleBlacklistModal();" class="w-14 h-14 bg-zinc-900 border border-zinc-700 text-white rounded-2xl shadow-lg flex items-center justify-center hover:scale-110 transition-all relative text-xl">
                <span>🚫</span>
                <span id="blacklistBadge" class="absolute -top-2 -right-2 bg-red-600 text-white text-[11px] w-6 h-6 flex items-center justify-center rounded-full font-bold hidden">0</span>
            </button>
        </div>
        <div class="group relative flex items-center">
            <span class="absolute right-full mr-4 px-3.5 py-2 bg-green-600 text-white text-[13px] font-bold rounded-xl opacity-0 group-hover:opacity-100 transition-all transform translate-x-4 group-hover:translate-x-0 whitespace-nowrap pointer-events-none shadow-xl">Xuất file Excel <span class="text-yellow-300 ml-1">(Ctrl+D)</span></span>
            <button onclick="exportUncompletedToExcel();" class="w-14 h-14 bg-white border border-slate-200 text-emerald-600 rounded-2xl shadow-lg flex items-center justify-center hover:scale-110 transition-all text-xl">
                <img src="https://img.icons8.com/color/48/microsoft-excel-2019--v1.png" alt="Excel Icon" class="w-7 h-7">
            </button>
        </div>
        <div class="group relative flex items-center">
            <span class="absolute right-full mr-4 px-3.5 py-2 bg-orange-500 text-white text-[13px] font-bold rounded-xl opacity-0 group-hover:opacity-100 transition-all transform translate-x-4 group-hover:translate-x-0 whitespace-nowrap pointer-events-none shadow-xl">Thùng rác</span>
            <button onclick="toggleRecycleBinModal();" class="w-14 h-14 bg-white border border-slate-200 text-orange-500 rounded-2xl shadow-lg flex items-center justify-center hover:scale-110 transition-all text-xl">🗑️</button>
        </div>
        <div class="group relative flex items-center mt-2">
            <span class="absolute right-full mr-4 px-3.5 py-2 text-white text-[13px] font-bold rounded-xl opacity-0 group-hover:opacity-100 transition-all transform translate-x-4 group-hover:translate-x-0 whitespace-nowrap pointer-events-none shadow-xl" style="background-color: var(--theme-color);">Thêm hóa đơn <span class="text-yellow-300 ml-1">(F2)</span></span>
            <button onclick="openAddForm();" class="w-[72px] h-[72px] btn-add text-white rounded-[1.5rem] flex items-center justify-center hover:rotate-12 hover:scale-110 active:scale-90 transition-all shadow-2xl text-3xl">➕</button>
        </div>
    </div>

    <div id="alertModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[20000] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2rem] p-8 shadow-2xl border-t-[10px] border-amber-500 relative">
            <div class="text-center">
                <span class="text-5xl">⚠️</span>
                <h3 class="text-2xl font-jakarta font-bold text-amber-600 uppercase mt-4">Hóa Đơn Quá Hạn</h3>
                <p class="text-slate-600 text-[15px] font-medium mt-2 mb-6">Bạn có các hóa đơn chưa hoàn thành từ 3 ngày trước!</p>
            </div>
            <div id="alertList" class="max-h-[300px] overflow-y-auto space-y-3 mb-8 px-2 custom-scrollbar"></div>
            <button onclick="document.getElementById('alertModal').classList.replace('flex', 'hidden')" class="w-full py-4 bg-amber-500 text-white font-bold rounded-xl shadow-lg hover:bg-amber-600 transition-all text-[15px]">Đã Hiểu (ESC)</button>
        </div>
    </div>

    <div id="blacklistModal" class="fixed inset-0 bg-black/60 backdrop-blur-lg z-[10000] hidden items-center justify-center p-4 transition-opacity" onclick="toggleBlacklistModal(event)">
        <div class="modal-content bg-zinc-900 w-full max-w-lg rounded-[2rem] p-8 max-h-[80vh] flex flex-col shadow-2xl border border-zinc-700" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6 text-white">
                <h3 class="text-2xl font-jakarta font-bold flex items-center gap-2">Danh Sách Đen 🚫</h3>
                <button onclick="toggleBlacklistModal()" class="w-10 h-10 flex items-center justify-center bg-zinc-800 rounded-full text-white hover:bg-red-600 transition-colors text-xl" title="Đóng (ESC)">✕</button>
            </div>
            <div id="blacklistDisplay" class="flex-1 overflow-y-auto space-y-3 px-1 custom-scrollbar"></div>
        </div>
    </div>

    <div id="listModal" class="fixed inset-0 bg-black/60 backdrop-blur-lg z-[10000] hidden items-center justify-center p-4 transition-opacity" onclick="closeListModal(event)">
        <div class="modal-content bg-white w-full max-w-2xl rounded-[2rem] p-8 max-h-[85vh] flex flex-col shadow-2xl border-t-[10px]" style="border-top-color: var(--theme-color);" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 id="listModalTitle" class="text-2xl font-jakarta font-bold text-slate-800 uppercase" style="color: var(--theme-color);">Danh sách</h3>
                <button onclick="document.getElementById('listModal').classList.replace('flex', 'hidden')" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-500 hover:bg-red-50 hover:text-red-500 transition-colors text-xl" title="Đóng (ESC)">✕</button>
            </div>
            <div id="listDisplay" class="flex-1 overflow-y-auto space-y-3 px-1 custom-scrollbar"></div>
        </div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-lg z-[10000] hidden items-center justify-center p-4 transition-opacity" onclick="closeForm(event)">
        <div class="modal-content bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl border-t-[10px] transition-colors" style="border-top-color: var(--theme-color);" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-[22px] font-jakarta font-bold uppercase mb-6 text-center tracking-wide" style="color: var(--theme-color);">Thông Tin Hóa Đơn</h3>
            <input type="hidden" id="formId">
            <div class="space-y-5">
                <div>
                    <label class="block text-[12px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-wider">Tên nhà cung cấp (Mỗi dòng 1 nhà)</label>
                    <textarea id="formName" rows="3" class="w-full p-4 rounded-xl bg-slate-50 border-2 border-slate-100 focus:bg-white focus:border-blue-400 outline-none font-semibold text-[16px] text-slate-800 transition-colors"></textarea>
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-wider">Ngày hóa đơn</label>
                    <input type="date" id="formDate" class="w-full p-4 rounded-xl bg-slate-50 border-2 border-slate-100 focus:bg-white focus:border-blue-400 outline-none font-semibold text-[16px] text-slate-800 transition-colors">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-wider">Liên Kết hóa đơn </label>
                    <input type="url" id="formLink" placeholder="Copy Liên kết dán vào đây..." class="w-full p-4 rounded-xl bg-slate-50 border-2 border-slate-100 focus:bg-white focus:border-blue-400 outline-none font-medium text-[15px] text-blue-600 transition-colors">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-wider">Ghi chú (Tùy chọn)</label>
                    <textarea id="formNote" rows="2" placeholder="Ghi chú thêm..." class="w-full p-4 rounded-xl bg-slate-50 border-2 border-slate-100 focus:bg-white focus:border-blue-400 outline-none font-medium text-[15px] text-slate-700 transition-colors"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3.5 font-bold text-slate-500 text-[14px] hover:bg-slate-100 rounded-xl transition-colors">Hủy Bỏ (ESC)</button>
                    <button onclick="handleSave()" class="flex-[2] py-3.5 text-white font-bold rounded-xl shadow-lg text-[14px] hover:shadow-xl active:scale-95 transition-all" style="background-color: var(--theme-color);">Lưu Dữ Liệu</button>
                </div>
            </div>
        </div>
    </div>

    <div id="recycleModal" class="fixed inset-0 bg-black/60 backdrop-blur-lg z-[10000] hidden items-center justify-center p-4 transition-opacity" onclick="toggleRecycleBinModal(event)">
        <div class="modal-content bg-white w-full max-w-lg rounded-[2rem] p-8 max-h-[80vh] flex flex-col shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-jakarta font-bold text-slate-800">Thùng Rác 🗑️</h3>
                <button onclick="toggleRecycleBinModal()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-500 hover:bg-red-50 hover:text-red-500 transition-colors text-xl" title="Đóng (ESC)">✕</button>
            </div>
            <div id="recycleDisplay" class="flex-1 overflow-y-auto space-y-3 px-1 custom-scrollbar"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC737M2y1nwrGP48rEQ8dVhpV4DwUkysg", authDomain: "duanluutrunew.firebaseapp.com", projectId: "duanluutrunew", storageBucket: "duanluutrunew.appspot.com", messagingSenderId: "1008741702165", appId: "1:1008741702165:web:7e81901f4aac66cb9a0c1c" };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.firestore(); 
        const COLL = 'medx_invoices'; 
        
        let currentPharmacy = 'NT Tuệ Thiện', currentFilter = 'all', allInvoices = [], unsub = null; 
        let hasShownAlert = false; 

        function removeVietnameseTones(str) {
            if(!str) return "";
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|ã|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            return str;
        }

        function getBlacklist(data) { return data.filter(item => item.everBlacklisted === true); }

        async function addToBlacklist(id) { 
            const item = allInvoices.find(i => i.id === id);
            if(confirm(item.everBlacklisted ? "Gỡ khỏi Danh Sách Đen?" : "Đưa vào Danh Sách Đen?")) { 
                await db.collection(COLL).doc(id).update({ everBlacklisted: !item.everBlacklisted }); 
                showToast("Đã cập nhật Danh Sách Đen! 🚫"); 
            } 
        }

        function updateBlacklistBadge(data) { 
            const list = getBlacklist(data); 
            const b = document.getElementById('blacklistBadge'); 
            if (list.length > 0) { b.innerText = list.length; b.classList.remove('hidden'); } else b.classList.add('hidden'); 
        }

        function renderBlacklist() { 
            const area = document.getElementById('blacklistDisplay'); const list = getBlacklist(allInvoices); 
            if (!list.length) { area.innerHTML = '<p class="text-center py-10 text-zinc-500 font-medium">Trống ✨</p>'; return; } 
            area.innerHTML = list.map(item => `<div class="flex items-center justify-between p-4 bg-zinc-800 rounded-xl border border-zinc-700 mb-3"><div class="flex-1"><p class="font-bold text-red-500 text-[16px]">${item.name}</p><p class="text-[12px] text-zinc-400 mt-1">Ngày: ${item.date}</p></div><div class="flex gap-2"><button onclick="addToBlacklist('${item.id}')" class="p-2.5 bg-zinc-700 text-zinc-300 rounded-lg hover:text-white transition-colors">🔓</button></div></div>`).join(''); 
        }

        function loadData() { 
            if (unsub) unsub(); 
            unsub = db.collection(COLL)
                .where('date', '>=', '2025-01-01')
                .orderBy('date', 'desc')
                .onSnapshot(snap => { 
                    allInvoices = []; 
                    snap.forEach(doc => allInvoices.push({ id: doc.id, ...doc.data() })); 
                    
                    allInvoices.sort((a, b) => {
                        if (b.date !== a.date) return b.date.localeCompare(a.date);
                        return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    });
                    applyFilters(); 
                    
                    if (!hasShownAlert) { checkOverdueInvoices(); }
                    if (!document.getElementById('blacklistModal').classList.contains('hidden')) renderBlacklist(); 
                }); 
        }

        function checkOverdueInvoices() {
            const today = new Date(); today.setHours(0,0,0,0);
            const overdueList = allInvoices.filter(i => {
                if (i.completed || i.isDeleted) return false;
                const diff = Math.floor((today - new Date(i.date)) / (1000 * 3600 * 24));
                return diff >= 3;
            });
            if (overdueList.length > 0) {
                document.getElementById('alertList').innerHTML = overdueList.map(i => `<div class="p-3.5 bg-amber-50/50 rounded-xl flex justify-between items-center border border-amber-100"><div class="min-w-0 flex-1"><p class="font-semibold text-slate-800 text-[15px] truncate">${i.name}</p><p class="text-[11px] font-bold text-amber-600 mt-0.5">${i.pharmacy} • ${i.date}</p></div><span class="text-red-500 font-bold text-[12px] ml-3 shrink-0 bg-red-50 px-2 py-1 rounded">TRỄ!</span></div>`).join('');
                document.getElementById('alertModal').classList.replace('hidden', 'flex');
                hasShownAlert = true; 
            }
        }

        async function handleSave() { 
            const id = document.getElementById('formId').value; 
            const rawNames = document.getElementById('formName').value.trim(); 
            const date = document.getElementById('formDate').value; 
            const link = document.getElementById('formLink').value.trim(); 
            const note = document.getElementById('formNote').value.trim();

            if (!rawNames || !date) return; 

            if (id) { 
                await db.collection(COLL).doc(id).update({ name: rawNames, date, link, note }); 
                showToast("Cập nhật thành công! ✅"); 
            } else {
                const nameList = rawNames.split('\n').filter(n => n.trim() !== "");
                const batch = db.batch(); const now = new Date();
                nameList.forEach((name, idx) => {
                    const docRef = db.collection(COLL).doc();
                    const staggeredTime = firebase.firestore.Timestamp.fromDate(new Date(now.getTime() + idx * 1000));
                    batch.set(docRef, { name, date, link, note, pharmacy: currentPharmacy, completed: false, isDeleted: false, everBlacklisted: false, createdAt: staggeredTime });
                });
                await batch.commit(); showToast(`Đã thêm thành công! 📦`);
            } 
            closeModal(); 
        }

        async function deleteOne(id) {
            if(confirm("Đưa hóa đơn này vào thùng rác?")) {
                await db.collection(COLL).doc(id).update({ isDeleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp() });
                showToast("Đã chuyển vào thùng rác! 🗑️");
            }
        }

        function applyFilters() { 
            const rawSearchVal = document.getElementById('mainSearch').value.toLowerCase();
            const searchVal = removeVietnameseTones(rawSearchVal);
            
            let pData = allInvoices.filter(i => !i.isDeleted && i.pharmacy === currentPharmacy);
            document.getElementById('totalCount').innerText = pData.length;
            document.getElementById('completedCount').innerText = pData.filter(i => i.completed).length;
            document.getElementById('pendingCount').innerText = pData.filter(i => !i.completed).length;

            let filtered = pData;
            if (currentFilter === 'uncompleted') filtered = filtered.filter(i => !i.completed); 
            
            if (rawSearchVal) {
                filtered = filtered.filter(i => {
                    const normalizedName = removeVietnameseTones(i.name.toLowerCase());
                    return normalizedName.includes(searchVal);
                });
            }
            renderInvoices(filtered); 
            updateBlacklistBadge(allInvoices); 
        }

        function renderInvoices(data) {
            const display = document.getElementById('invoiceDisplay');
            if (!data.length) { display.innerHTML = '<p class="text-center py-20 font-semibold text-[15px] text-slate-400">Không có hóa đơn nào 📭</p>'; return; }
            
            const monthGroups = data.reduce((acc, item) => {
                const d = new Date(item.date);
                const key = `${d.getMonth() + 1}-${d.getFullYear()}`;
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            let html = '';
            Object.keys(monthGroups).forEach(monthKey => {
                html += `<div class="month-block mb-10"><div class="timeline-month-header flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-2xl">📅</span><h2 class="text-[20px] font-jakarta font-bold text-slate-800">${monthKey}</h2></div></div>`;
                const dateGroups = monthGroups[monthKey].reduce((acc, item) => { acc[item.date] = acc[item.date] || []; acc[item.date].push(item); return acc; }, {});
                
                Object.keys(dateGroups).sort((a,b) => new Date(b) - new Date(a)).forEach(dateStr => {
                    const d = new Date(dateStr);
                    html += `<div class="mb-12"><div class="sticky top-[60px] z-10 bg-[#f8fafc]/95 backdrop-blur-md py-4 flex items-center justify-between border-b-2 border-slate-200 mb-6"><div class="flex items-center gap-4"><div class="bg-white border border-slate-200 rounded-xl p-1.5 shadow-sm text-center min-w-[65px]"><div class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Ngày</div><div class="text-[26px] font-jakarta font-black leading-none" style="color: var(--theme-color);">${d.getDate()}</div></div><div><p class="text-[18px] font-semibold text-slate-700">${d.toLocaleDateString('vi-VN', { weekday: 'long' })}</p></div></div></div>`;
                    
                    const linkGroups = dateGroups[dateStr].reduce((acc, item) => {
                        const linkKey = (item.link && item.link.trim() !== "") ? item.link : "no_link";
                        if (!acc[linkKey]) acc[linkKey] = [];
                        acc[linkKey].push(item);
                        return acc;
                    }, {});

                    Object.keys(linkGroups).forEach(linkKey => {
                        const items = linkGroups[linkKey];
                        const isNoLink = linkKey === "no_link";
                        const cCount = items.filter(it => it.completed).length;
                        html += `<div class="link-batch-box"><div class="flex items-center justify-between mb-5 pb-3 border-b border-slate-100"><div class="flex items-center gap-2"><span class="text-xl">${isNoLink ? '📦' : '📂'}</span><span class="text-[12px] font-bold uppercase tracking-widest ${isNoLink ? 'text-slate-500' : 'text-blue-600'}">${isNoLink ? 'Hóa đơn lẻ' : 'DANH SÁCH '} <span class="ml-2 bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full text-[11px]">Hóa đơn: ${cCount}/${items.length}</span></span></div>${!isNoLink ? `<a href="${linkKey}" target="_blank" class="btn-luxury-view shadow-sm">Xem Hóa Đơn ↗</a>` : ''}</div><div class="space-y-3">`;
                        
                        items.forEach(item => {
                            const noteHtml = item.note ? `<p class="text-[14px] text-slate-600 font-medium mt-2 bg-slate-50 px-3.5 py-2.5 rounded-lg border border-slate-100 inline-block w-full"><span class="mr-1">📝</span>${item.note}</p>` : '';

                            html += `<div class="invoice-card group ${item.everBlacklisted ? 'border-zinc-800 border-l-[6px]' : ''}"><div class="invoice-content-wrapper"><button onclick="db.collection(COLL).doc('${item.id}').update({completed: ${!item.completed}})" class="w-11 h-11 min-w-[44px] rounded-full border-2 flex items-center justify-center transition-all mt-0.5 text-lg ${item.completed ? 'bg-green-500 text-white border-green-500' : 'border-slate-300 text-slate-300 hover:border-slate-400'}">${item.completed ? '✓' : ''}</button><div class="invoice-text-section"><span onclick="openEditForm('${item.id}')" title="Nhấn để chỉnh sửa" class="invoice-name ${item.completed ? 'line-through opacity-40 text-slate-500 hover:text-slate-700' : ''}">${item.name}</span>${noteHtml}<p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide mt-2.5">${item.pharmacy}</p></div><div class="flex items-center gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity shrink-0"><button onclick="addToBlacklist('${item.id}')" class="p-2.5 bg-zinc-100 text-zinc-600 rounded-xl hover:bg-zinc-800 hover:text-white transition-colors" title="Thêm vào danh sách đen">🚫</button><button onclick="deleteOne('${item.id}')" class="p-2.5 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-colors" title="Xóa">🗑️</button></div></div></div>`;
                        });
                        html += `</div></div>`;
                    }); html += `</div>`;
                }); html += `</div>`;
            }); display.innerHTML = html;
        }

        // HÀM HIỂN THỊ DANH SÁCH THEO THỐNG KÊ
        function showListModal(type) {
            const m = document.getElementById('listModal');
            const title = document.getElementById('listModalTitle');
            const display = document.getElementById('listDisplay');

            let data = allInvoices.filter(i => !i.isDeleted && i.pharmacy === currentPharmacy);

            if (type === 'completed') {
                data = data.filter(i => i.completed);
                title.innerText = `Đã Xong - ${currentPharmacy}`;
            } else if (type === 'pending') {
                data = data.filter(i => !i.completed);
                title.innerText = `Còn Lại - ${currentPharmacy}`;
            } else {
                title.innerText = `Tổng Hóa Đơn - ${currentPharmacy}`;
            }

            if (!data.length) {
                display.innerHTML = '<p class="text-center py-10 text-slate-500 font-medium">Trống ✨</p>';
            } else {
                display.innerHTML = data.map(item => {
                    // Nếu có link thì hiển thị thẻ <a>, không thì hiển thị <span>
                    const nameHtml = item.link 
                        ? `<a href="${item.link}" target="_blank" title="Mở file hóa đơn" class="font-bold text-blue-600 hover:text-blue-800 hover:underline text-[16px] ${item.completed ? 'line-through opacity-70' : ''}">${item.name} ↗</a>`
                        : `<span class="font-semibold text-slate-800 text-[16px] ${item.completed ? 'line-through opacity-70' : ''}">${item.name}</span>`;

                    return `
                    <div class="flex flex-col p-4 bg-slate-50 border border-slate-100 rounded-xl mb-3 hover:shadow-md transition-shadow ${item.completed ? 'opacity-80' : ''}">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex-1 break-words">
                                ${nameHtml}
                            </div>
                            <span class="text-[11px] font-bold ${item.completed ? 'text-green-600 bg-green-100' : 'text-orange-600 bg-orange-100'} px-2.5 py-1 rounded-md shrink-0 mt-0.5">
                                ${item.completed ? '✓ Đã xong' : '⏳ Còn lại'}
                            </span>
                        </div>
                        <div class="flex items-center mt-2.5">
                            <span class="text-[13px] font-medium text-slate-500 flex items-center gap-1">📅 ${item.date}</span>
                        </div>
                        ${item.note ? `<div class="mt-3 text-[14px] text-slate-600 bg-white px-3.5 py-2.5 rounded-lg border border-slate-200"><span class="mr-1">📝</span>${item.note}</div>` : ''}
                    </div>`;
                }).join('');
            }

            m.classList.replace('hidden', 'flex');
        }

        function closeListModal(e) {
            if (e.target.id === 'listModal') {
                document.getElementById('listModal').classList.replace('flex', 'hidden');
            }
        }

        async function cleanupCompleted() { 
            const listToCleanup = allInvoices.filter(i => i.completed === true && i.isDeleted !== true && i.pharmacy === currentPharmacy);
            if (listToCleanup.length === 0) { showToast("Không có hóa đơn nào cần dọn dẹp! ✨"); return; }
            if (confirm(`Dọn dẹp ${listToCleanup.length} mục đã xong của ${currentPharmacy}?`)) { 
                try {
                    const batch = db.batch();
                    listToCleanup.forEach(i => { batch.update(db.collection(COLL).doc(i.id), { isDeleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp() }); });
                    await batch.commit(); showToast("Đã dọn dẹp hệ thống! 🧹");
                } catch (e) { showToast("Lỗi dọn dẹp! ❌"); }
            } 
        }

        function togglePharmacy(name, tid) { 
            currentPharmacy = name; 
            ['tabTueThien', 'tabHungThinh', 'tabPhucAn'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('active');
                el.style.fontWeight = '600';
            }); 
            
            const activeTab = document.getElementById('tab' + tid);
            activeTab.classList.add('active'); 
            activeTab.style.fontWeight = '700';
            
            const root = document.documentElement;
            if (tid === 'TueThien') { root.style.setProperty('--theme-color', '#2563eb'); } 
            else if (tid === 'HungThinh') { root.style.setProperty('--theme-color', '#059669'); } 
            else if (tid === 'PhucAn') { root.style.setProperty('--theme-color', '#db2777'); } 
            
            applyFilters(); 
        }
        
        function changeFilter(type) { 
            currentFilter = type;
            const btnAll = document.getElementById('filterAll');
            const btnUn = document.getElementById('filterUncompleted');
            if(type === 'all') {
                btnAll.className = "px-6 py-3 text-[14px] font-bold rounded-xl bg-slate-800 text-white shadow-md transition-all";
                btnUn.className = "px-6 py-3 text-[14px] font-bold rounded-xl text-slate-500 transition-all hover:text-slate-800";
            } else {
                btnUn.className = "px-6 py-3 text-[14px] font-bold rounded-xl bg-slate-800 text-white shadow-md transition-all";
                btnAll.className = "px-6 py-3 text-[14px] font-bold rounded-xl text-slate-500 transition-all hover:text-slate-800";
            }
            applyFilters(); 
        }

        function openAddForm() { 
            document.getElementById('formId').value = ''; 
            document.getElementById('formName').value = ''; 
            document.getElementById('formLink').value = ''; 
            document.getElementById('formNote').value = ''; 
            document.getElementById('formDate').value = new Date().toISOString().split('T')[0]; 
            document.getElementById('modalOverlay').classList.replace('hidden', 'flex'); 
        }
        
        function openEditForm(id) { 
            const i = allInvoices.find(it => it.id === id); 
            document.getElementById('formId').value = i.id; 
            document.getElementById('formName').value = i.name; 
            document.getElementById('formDate').value = i.date; 
            document.getElementById('formLink').value = i.link || ''; 
            document.getElementById('formNote').value = i.note || ''; 
            document.getElementById('modalOverlay').classList.replace('hidden', 'flex'); 
        }
        
        function closeModal() { document.getElementById('modalOverlay').classList.replace('flex', 'hidden'); }

        function toggleBlacklistModal(e) { 
            const m = document.getElementById('blacklistModal'); 
            if (e && e.target.id !== 'blacklistModal' && !e.target.closest('button[title="Danh Sách Đen"]')) return; 
            if (m.classList.contains('hidden')) { m.classList.replace('hidden', 'flex'); renderBlacklist(); } else m.classList.replace('flex', 'hidden'); 
        }

        function toggleRecycleBinModal(e) { 
            const m = document.getElementById('recycleModal'); 
            if (e && e.target.id !== 'recycleModal' && !e.target.closest('button[title="Thùng rác"]')) return; 
            if (m.classList.contains('hidden')) { 
                m.classList.replace('hidden', 'flex'); 
                db.collection(COLL).where('isDeleted', '==', true).orderBy('deletedAt', 'desc').limit(30).get().then(s => { 
                    document.getElementById('recycleDisplay').innerHTML = s.docs.map(doc => `
                        <div class="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-xl mb-3">
                            <div class="flex flex-col">
                                <span class="font-semibold text-slate-800 text-[15px]">${doc.data().name}</span>
                                <span class="text-[12px] font-medium text-slate-500 mt-1">${doc.data().date}</span>
                            </div>
                            <button onclick="restoreItem('${doc.id}')" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-bold text-[13px] hover:bg-blue-200 transition-colors">Phục hồi</button>
                        </div>`).join(''); 
                }); 
            } else m.classList.replace('flex', 'hidden'); 
        }

        async function restoreItem(id) {
            await db.collection(COLL).doc(id).update({ isDeleted: false });
            showToast("Đã phục hồi hóa đơn! 🎁");
            toggleRecycleBinModal(); 
        }

        function showToast(msg) { 
            const c = document.getElementById('toastContainer'); const id = Date.now(); 
            c.insertAdjacentHTML('beforeend', `<div id="${id}" class="text-white px-6 py-4 rounded-xl shadow-xl font-bold transition-all text-[15px]" style="background-color: var(--theme-color);">${msg}</div>`); 
            setTimeout(() => document.getElementById(id)?.remove(), 3000); 
        }
        
        function closeForm(e) { if(e.target.id === 'modalOverlay') closeModal(); }

        async function exportUncompletedToExcel() {
            const data = allInvoices.filter(i => !i.completed && i.isDeleted !== true);
            if (!data.length) { showToast("Không có dữ liệu! ✨"); return; }
            const ws = XLSX.utils.json_to_sheet(data.map(i => ({"Ngày": i.date, "Nhà Thuốc": i.pharmacy, "Nhà Cung Cấp": i.name, "Ghi chú": i.note || "", "Link": i.link || "" })));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "HOA DON");
            XLSX.writeFile(wb, `HOA_DON_TONG_HOP_2026.xlsx`);
            showToast("Đã xuất file tổng hợp! 📊");
        }

        // HỆ THỐNG PHÍM TẮT (HOTKEYS) VỚI NÚT ESC
        document.addEventListener('keydown', function(e) {
            const isTyping = ['INPUT', 'TEXTAREA'].includes(e.target.tagName);

            if (e.key === 'Escape') {
                e.preventDefault();
                document.getElementById('modalOverlay').classList.replace('flex', 'hidden');
                document.getElementById('blacklistModal').classList.replace('flex', 'hidden');
                document.getElementById('recycleModal').classList.replace('flex', 'hidden');
                document.getElementById('alertModal').classList.replace('flex', 'hidden');
                document.getElementById('listModal').classList.replace('flex', 'hidden'); 
                
                if (document.activeElement) {
                    document.activeElement.blur();
                }
                return;
            }

            if (e.key === 'F2') { e.preventDefault(); openAddForm(); return; }

            if (e.ctrlKey && e.key.toLowerCase() === 'd') {
                e.preventDefault(); exportUncompletedToExcel(); return;
            }

            if (e.ctrlKey && e.key.toLowerCase() === 'x') {
                if (!isTyping) { e.preventDefault(); cleanupCompleted(); return; }
            }

            if (!isTyping && e.key.toLowerCase() === 'f') {
                e.preventDefault(); document.getElementById('mainSearch').focus(); return;
            }

            if (!isTyping && !e.ctrlKey && !e.altKey && !e.metaKey) {
                if (e.key === '1') { e.preventDefault(); togglePharmacy('NT Tuệ Thiện', 'TueThien'); } 
                else if (e.key === '2') { e.preventDefault(); togglePharmacy('NT Hưng Thịnh', 'HungThinh'); } 
                else if (e.key === '3') { e.preventDefault(); togglePharmacy('NT Phúc An', 'PhucAn'); }
            }
        });

        window.onload = () => { 
            setTimeout(() => { document.getElementById('loadingIndicator').classList.add('hidden'); loadData(); }, 1000); 
        };
    </script>
</body>
</html>
