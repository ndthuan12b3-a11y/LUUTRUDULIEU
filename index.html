<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Hóa Đơn - 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --smooth: cubic-bezier(0.4, 0, 0.2, 1); 
            /* Mặc định là màu xanh của Tuệ Thiện */
            --theme-color: #2563eb; 
            --theme-dark: #1e3a8a;
        }
        
        body { 
            background: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #0f172a; 
            overflow-x: hidden; 
        }

        /* HIỆU ỨNG CHUYỂN MÀU NỀN THEO NHÀ THUỐC */
        .app-gradient { 
            background-color: var(--theme-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15), transparent 70%);
            transition: background-color 0.6s ease;
            position: relative; 
            border-bottom: 5px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }

        .tab-btn { font-weight: 700; color: rgba(255,255,255,0.7); transition: all 0.4s var(--smooth); }
        .tab-btn.active { background: white; border-radius: 16px; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        #tabTueThien.active { color: #2563eb !important; } 
        #tabHungThinh.active { color: #059669 !important; } 
        #tabPhucAn.active { color: #db2777 !important; }
        
        .luxury-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(25px); border-radius: 3rem; border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 30px 80px -10px rgba(0, 0, 0, 0.05); }
        .link-batch-box { background: white; border: 1px solid #f1f5f9; border-radius: 28px; padding: 1.5rem; margin-bottom: 2rem; position: relative; border-left: 8px solid var(--theme-color); transition: border-color 0.6s ease, box-shadow 0.3s; }
        .link-batch-box:hover { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); }
        
        .btn-luxury-view {
            background: #f8fafc;
            color: var(--theme-color) !important;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 18px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-luxury-view:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1); background: white; }
        
        .invoice-card { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 18px; transition: all 0.3s var(--smooth); margin-bottom: 0.75rem; min-height: 80px; height: auto; display: flex; align-items: flex-start; padding: 1rem; width: 100%; }
        .invoice-card:hover { transform: translateY(-2px); background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border-color: #e2e8f0; }
        .invoice-content-wrapper { display: flex; align-items: flex-start; gap: 1rem; width: 100%; }
        .invoice-text-section { flex: 1; min-width: 0; }
        .invoice-name { font-weight: 700; word-break: break-word; overflow-wrap: break-word; line-height: 1.5; color: #1e293b; display: block; }
        
        .btn-add { background: var(--theme-color); border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: background-color 0.6s ease; }
        .main-title { text-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dash-item { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; transition: transform 0.3s; }
        .timeline-month-header { position: sticky; top: -1px; z-index: 40; background: #f8fafc; padding: 15px 0; border-bottom: 2px dashed #cbd5e1; margin-bottom: 20px; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loadingIndicator" class="fixed inset-0 z-[10000] flex items-center justify-center bg-white">
        <div class="w-16 h-16 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin" style="border-top-color: var(--theme-color);"></div>
    </div>
    
    <div id="toastContainer" class="fixed top-8 right-8 z-[10001] space-y-4 w-80 pointer-events-none"></div>

    <nav class="app-gradient pt-16 pb-28 px-4">
        <div class="max-w-4xl mx-auto flex flex-col items-center relative z-20">
            <h1 class="text-4xl md:text-5xl font-800 text-white mb-10 main-title uppercase tracking-wider cursor-pointer">HỆ THỐNG HÓA ĐƠN</h1>
            
            <div class="w-full max-w-xl bg-black/20 backdrop-blur-md p-2 rounded-[2rem] flex items-center border border-white/10 shadow-xl">
                <button id="tabTueThien" onclick="togglePharmacy('NT Tuệ Thiện', 'TueThien');" class="tab-btn flex-1 py-4 uppercase rounded-2xl text-sm active">Tuệ Thiện</button>
                <button id="tabHungThinh" onclick="togglePharmacy('NT Hưng Thịnh', 'HungThinh');" class="tab-btn flex-1 py-4 uppercase rounded-2xl text-sm">Hưng Thịnh</button>
                <button id="tabPhucAn" onclick="togglePharmacy('NT Phúc An', 'PhucAn');" class="tab-btn flex-1 py-4 uppercase rounded-2xl text-sm">Phúc An</button>
            </div>

            <div class="w-full max-w-xl mt-10 grid grid-cols-3 gap-6 text-white text-center">
                <div class="dash-item p-4">
                    <p id="totalCount" class="text-3xl font-900 text-white">0</p>
                    <p class="text-[10px] font-bold uppercase opacity-80 mt-1">Tồn Kho 📦</p>
                </div>
                <div class="dash-item p-4">
                    <p id="completedCount" class="text-3xl font-900 text-green-300">0</p>
                    <p class="text-[10px] font-bold uppercase opacity-80 mt-1">Đã Xong ✅</p>
                </div>
                <div class="dash-item p-4">
                    <p id="pendingCount" class="text-3xl font-900 text-orange-200">0</p>
                    <p class="text-[10px] font-bold uppercase opacity-80 mt-1">Còn Lại ⏳</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 -mt-20 relative z-30 pb-32">
        <div class="luxury-panel p-8 md:p-12 min-h-[500px]">
            <div class="flex flex-col md:flex-row gap-5 mb-10">
                <div class="relative flex-1">
                    <input type="text" id="mainSearch" oninput="applyFilters()" placeholder="Tìm kiếm nhà cung cấp..." class="w-full pl-14 pr-6 py-5 rounded-[2rem] bg-slate-50 border-2 border-transparent focus:bg-white focus:border-slate-300 outline-none font-bold text-slate-700 shadow-inner transition-all">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-2xl opacity-50">🔍</span>
                </div>
                <div class="flex bg-slate-50 p-2 rounded-[1.5rem] border border-slate-100 shadow-inner">
                    <button id="filterAll" onclick="changeFilter('all')" class="px-6 py-3 text-xs font-900 rounded-2xl bg-slate-800 text-white shadow-lg uppercase transition-all">Tất cả</button>
                    <button id="filterUncompleted" onclick="changeFilter('uncompleted')" class="px-6 py-3 text-xs font-900 rounded-2xl text-slate-400 uppercase transition-all hover:text-slate-700">Chưa xong</button>
                </div>
            </div>
            <div id="invoiceDisplay" class="space-y-8"></div>
        </div>
    </main>

    <div class="fixed bottom-10 right-10 flex flex-col gap-5 items-end z-[9000]">
        <button onclick="cleanupCompleted();" class="w-16 h-16 bg-white border border-slate-200 text-slate-600 rounded-2xl shadow-xl flex items-center justify-center hover:scale-110 active:rotate-12 transition-all" title="Dọn dẹp danh sách đã xong">🧹</button>
        <button onclick="toggleBlacklistModal();" class="w-16 h-16 bg-zinc-900 border border-zinc-700 text-white rounded-2xl shadow-xl flex items-center justify-center hover:scale-110 transition-all relative" title="Danh Sách Đen">
            <span>📓</span>
            <span id="blacklistBadge" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-6 h-6 flex items-center justify-center rounded-full font-bold hidden">0</span>
        </button>
        <button onclick="exportUncompletedToExcel();" class="w-16 h-16 bg-white border border-slate-200 text-emerald-600 rounded-2xl shadow-xl flex items-center justify-center hover:scale-110 transition-all" title="Xuất Excel">📊</button>
        <button onclick="toggleRecycleBinModal();" class="w-16 h-16 bg-white border border-slate-200 text-orange-500 rounded-2xl shadow-xl flex items-center justify-center hover:scale-110 transition-all" title="Thùng rác">🗑️</button>
        <button onclick="openAddForm();" class="w-20 h-20 btn-add text-white rounded-[1.8rem] flex items-center justify-center hover:rotate-12 hover:scale-110 active:scale-90 transition-all shadow-2xl text-4xl">➕</button>
    </div>

    <div id="alertModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[20000] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-8 shadow-2xl border-t-[12px] border-amber-500 relative">
            <div class="text-center">
                <span class="text-6xl">⚠️</span>
                <h3 class="text-2xl font-900 text-amber-600 uppercase mt-4">Hóa Đơn Quá Hạn (3 Ngày+)</h3>
                <p class="text-slate-500 text-sm mb-6">Bạn có các hóa đơn chưa hoàn thành từ 3 ngày trước!</p>
            </div>
            <div id="alertList" class="max-h-[300px] overflow-y-auto space-y-3 mb-8 px-2 custom-scrollbar"></div>
            <button onclick="document.getElementById('alertModal').classList.replace('flex', 'hidden')" class="w-full py-4 bg-amber-500 text-white font-900 rounded-2xl shadow-lg uppercase hover:bg-amber-600 transition-all">Đã Hiểu</button>
        </div>
    </div>

    <div id="blacklistModal" class="fixed inset-0 bg-black/60 backdrop-blur-lg z-[10000] hidden items-center justify-center p-4 transition-opacity" onclick="toggleBlacklistModal(event)">
        <div class="modal-content bg-zinc-900 w-full max-w-lg rounded-[2.5rem] p-8 max-h-[80vh] flex flex-col shadow-2xl border border-zinc-700" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6 text-white">
                <h3 class="text-2xl font-900 flex items-center gap-2">Danh Sách Đen 📓</h3>
                <button onclick="toggleBlacklistModal()" class="w-10 h-10 flex items-center justify-center bg-zinc-800 rounded-full text-white hover:bg-red-600 transition-colors">✕</button>
            </div>
            <div id="blacklistDisplay" class="flex-1 overflow-y-auto space-y-3 px-1 custom-scrollbar"></div>
        </div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-lg z-[10000] hidden items-center justify-center p-4 transition-opacity" onclick="closeForm(event)">
        <div class="modal-content bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl border-t-[12px] transition-colors" style="border-top-color: var(--theme-color);" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-3xl font-900 uppercase mb-8 text-center" style="color: var(--theme-color);">Thông Tin Hóa Đơn</h3>
            <input type="hidden" id="formId">
            <div class="space-y-5">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2 ml-2 tracking-widest">Tên nhà cung cấp (Mỗi dòng 1 nhà)</label>
                    <textarea id="formName" rows="3" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none font-bold text-lg text-slate-800 transition-colors"></textarea>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2 ml-2 tracking-widest">Ngày hóa đơn</label>
                    <input type="date" id="formDate" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none font-bold text-slate-800 transition-colors">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2 ml-2 tracking-widest">Link hóa đơn (Dùng để tách đợt)</label>
                    <input type="url" id="formLink" placeholder="https://..." class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none font-bold text-sm text-blue-600 transition-colors">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2 ml-2 tracking-widest">Ghi chú (Tùy chọn)</label>
                    <textarea id="formNote" rows="2" placeholder="Ghi chú thêm cho công ty này..." class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none text-sm text-slate-700 transition-colors"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400 uppercase text-xs hover:bg-slate-50 rounded-xl transition-colors">Hủy Bỏ</button>
                    <button onclick="handleSave()" class="flex-[2] py-4 text-white font-bold rounded-2xl shadow-xl uppercase text-xs hover:shadow-2xl active:scale-95 transition-all" style="background-color: var(--theme-color);">Lưu Dữ Liệu</button>
                </div>
            </div>
        </div>
    </div>

    <div id="recycleModal" class="fixed inset-0 bg-black/60 backdrop-blur-lg z-[10000] hidden items-center justify-center p-4 transition-opacity" onclick="toggleRecycleBinModal(event)">
        <div class="modal-content bg-white w-full max-w-lg rounded-[2.5rem] p-8 max-h-[80vh] flex flex-col shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-900 text-slate-800 uppercase">Thùng Rác 🗑️</h3>
                <button onclick="toggleRecycleBinModal()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-500 font-black hover:bg-red-50 hover:text-red-500 transition-colors">✕</button>
            </div>
            <div id="recycleDisplay" class="flex-1 overflow-y-auto space-y-3 px-1 custom-scrollbar"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC737M2y1nwrGP48rEQ8dVhpV4DwUkysg", authDomain: "duanluutrunew.firebaseapp.com", projectId: "duanluutrunew", storageBucket: "duanluutrunew.appspot.com", messagingSenderId: "1008741702165", appId: "1:1008741702165:web:7e81901f4aac66cb9a0c1c" };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.firestore(); 
        const COLL = 'medx_invoices'; 
        
        let currentPharmacy = 'NT Tuệ Thiện', currentFilter = 'all', allInvoices = [], unsub = null; 
        let hasShownAlert = false; 

        function removeVietnameseTones(str) {
            if(!str) return "";
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|ã|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            return str;
        }

        function getBlacklist(data) { return data.filter(item => item.everBlacklisted === true); }

        async function addToBlacklist(id) { 
            const item = allInvoices.find(i => i.id === id);
            if(confirm(item.everBlacklisted ? "Gỡ khỏi Danh Sách Đen?" : "Đưa vào Danh Sách Đen?")) { 
                await db.collection(COLL).doc(id).update({ everBlacklisted: !item.everBlacklisted }); 
                showToast("Đã cập nhật Danh Sách Đen! 📓"); 
            } 
        }

        function updateBlacklistBadge(data) { 
            const list = getBlacklist(data); 
            const b = document.getElementById('blacklistBadge'); 
            if (list.length > 0) { b.innerText = list.length; b.classList.remove('hidden'); } else b.classList.add('hidden'); 
        }

        function renderBlacklist() { 
            const area = document.getElementById('blacklistDisplay'); const list = getBlacklist(allInvoices); 
            if (!list.length) { area.innerHTML = '<p class="text-center py-10 text-zinc-500 italic">Trống ✨</p>'; return; } 
            area.innerHTML = list.map(item => `<div class="flex items-center justify-between p-5 bg-zinc-800/50 rounded-2xl border border-zinc-700 mb-3"><div class="flex-1"><p class="font-bold text-red-500 text-lg leading-tight">${item.name}</p><p class="text-[10px] text-zinc-400 mt-1">Ngày: ${item.date}</p></div><div class="flex gap-2"><button onclick="addToBlacklist('${item.id}')" class="p-3 bg-zinc-700 text-zinc-300 rounded-xl hover:text-white">🔓</button></div></div>`).join(''); 
        }

        function loadData() { 
            if (unsub) unsub(); 
            unsub = db.collection(COLL)
                .where('date', '>=', '2025-01-01')
                .orderBy('date', 'desc')
                .onSnapshot(snap => { 
                    allInvoices = []; 
                    snap.forEach(doc => allInvoices.push({ id: doc.id, ...doc.data() })); 
                    
                    allInvoices.sort((a, b) => {
                        if (b.date !== a.date) return b.date.localeCompare(a.date);
                        return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    });
                    applyFilters(); 
                    
                    if (!hasShownAlert) { checkOverdueInvoices(); }
                    if (!document.getElementById('blacklistModal').classList.contains('hidden')) renderBlacklist(); 
                }); 
        }

        function checkOverdueInvoices() {
            const today = new Date(); today.setHours(0,0,0,0);
            const overdueList = allInvoices.filter(i => {
                if (i.completed || i.isDeleted) return false;
                const diff = Math.floor((today - new Date(i.date)) / (1000 * 3600 * 24));
                return diff >= 3;
            });
            if (overdueList.length > 0) {
                document.getElementById('alertList').innerHTML = overdueList.map(i => `<div class="p-3 bg-amber-50 rounded-xl flex justify-between items-center border border-amber-100"><div class="min-w-0 flex-1"><p class="font-bold text-slate-800 truncate">${i.name}</p><p class="text-[9px] font-black text-amber-600">${i.pharmacy} - ${i.date}</p></div><span class="text-red-500 font-black text-[10px] ml-2 shrink-0">TRỄ!</span></div>`).join('');
                document.getElementById('alertModal').classList.replace('hidden', 'flex');
                hasShownAlert = true; 
            }
        }

        async function handleSave() { 
            const id = document.getElementById('formId').value; 
            const rawNames = document.getElementById('formName').value.trim(); 
            const date = document.getElementById('formDate').value; 
            const link = document.getElementById('formLink').value.trim(); 
            const note = document.getElementById('formNote').value.trim(); // Lấy dữ liệu ghi chú

            if (!rawNames || !date) return; 

            if (id) { 
                await db.collection(COLL).doc(id).update({ name: rawNames, date, link, note }); 
                showToast("Cập nhật thành công! ✅"); 
            } else {
                const nameList = rawNames.split('\n').filter(n => n.trim() !== "");
                const batch = db.batch(); const now = new Date();
                nameList.forEach((name, idx) => {
                    const docRef = db.collection(COLL).doc();
                    const staggeredTime = firebase.firestore.Timestamp.fromDate(new Date(now.getTime() + idx * 1000));
                    batch.set(docRef, { name, date, link, note, pharmacy: currentPharmacy, completed: false, isDeleted: false, everBlacklisted: false, createdAt: staggeredTime });
                });
                await batch.commit(); showToast(`Đã thêm thành công! 📦`);
            } 
            closeModal(); 
        }

        async function deleteOne(id) {
            if(confirm("Đưa hóa đơn này vào thùng rác?")) {
                await db.collection(COLL).doc(id).update({ isDeleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp() });
                showToast("Đã chuyển vào thùng rác! 🗑️");
            }
        }

        function applyFilters() { 
            const rawSearchVal = document.getElementById('mainSearch').value.toLowerCase();
            const searchVal = removeVietnameseTones(rawSearchVal);
            
            let pData = allInvoices.filter(i => !i.isDeleted && i.pharmacy === currentPharmacy);
            document.getElementById('totalCount').innerText = pData.length;
            document.getElementById('completedCount').innerText = pData.filter(i => i.completed).length;
            document.getElementById('pendingCount').innerText = pData.filter(i => !i.completed).length;

            let filtered = pData;
            if (currentFilter === 'uncompleted') filtered = filtered.filter(i => !i.completed); 
            
            if (rawSearchVal) {
                filtered = filtered.filter(i => {
                    const normalizedName = removeVietnameseTones(i.name.toLowerCase());
                    return normalizedName.includes(searchVal);
                });
            }
            renderInvoices(filtered); 
            updateBlacklistBadge(allInvoices); 
        }

        function renderInvoices(data) {
            const display = document.getElementById('invoiceDisplay');
            if (!data.length) { display.innerHTML = '<p class="text-center py-20 opacity-40 font-black uppercase text-slate-500 tracking-[0.2em]">Danh sách trống</p>'; return; }
            
            const monthGroups = data.reduce((acc, item) => {
                const d = new Date(item.date);
                const key = `Tháng ${d.getMonth() + 1} năm ${d.getFullYear()}`;
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            let html = '';
            Object.keys(monthGroups).forEach(monthKey => {
                html += `<div class="month-block mb-10"><div class="timeline-month-header flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-2xl">📅</span><h2 class="text-xl font-900 text-slate-700 uppercase">${monthKey}</h2></div></div>`;
                const dateGroups = monthGroups[monthKey].reduce((acc, item) => { acc[item.date] = acc[item.date] || []; acc[item.date].push(item); return acc; }, {});
                
                Object.keys(dateGroups).sort((a,b) => new Date(b) - new Date(a)).forEach(dateStr => {
                    const d = new Date(dateStr);
                    html += `<div class="mb-12"><div class="sticky top-[60px] z-10 bg-[#f8fafc]/95 backdrop-blur-md py-4 flex items-center justify-between border-b-2 border-slate-200 mb-6"><div class="flex items-center gap-4"><div class="bg-white border border-slate-200 rounded-2xl p-1 shadow-sm text-center min-w-[60px]"><div class="text-[10px] font-black text-slate-400 uppercase">Ngày</div><div class="text-2xl font-900" style="color: var(--theme-color);">${d.getDate()}</div></div><div><p class="text-xl font-800 text-slate-700">${d.toLocaleDateString('vi-VN', { weekday: 'long' })}</p></div></div></div>`;
                    
                    const linkGroups = dateGroups[dateStr].reduce((acc, item) => {
                        const linkKey = (item.link && item.link.trim() !== "") ? item.link : "no_link";
                        if (!acc[linkKey]) acc[linkKey] = [];
                        acc[linkKey].push(item);
                        return acc;
                    }, {});

                    Object.keys(linkGroups).forEach(linkKey => {
                        const items = linkGroups[linkKey];
                        const isNoLink = linkKey === "no_link";
                        const cCount = items.filter(it => it.completed).length;
                        html += `<div class="link-batch-box"><div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100"><div class="flex items-center gap-2"><span class="text-xl">${isNoLink ? '📦' : '📂'}</span><span class="text-[10px] font-900 uppercase tracking-widest ${isNoLink ? 'text-slate-400' : 'text-blue-600'}">${isNoLink ? 'Hóa đơn lẻ' : 'DANH SÁCH HÓA ĐƠN'} <span class="ml-2 bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">Hóa đơn: ${cCount}/${items.length}</span></span></div>${!isNoLink ? `<a href="${linkKey}" target="_blank" class="btn-luxury-view shadow-sm">Xem Hóa Đơn ↗</a>` : ''}</div><div class="space-y-2">`;
                        
                        items.forEach(item => {
                            // Xử lý hiển thị phần Note (Ghi chú)
                            const noteHtml = item.note ? `<p class="text-xs text-slate-600 italic mt-1.5 bg-slate-100/80 px-3 py-2 rounded-lg border border-slate-200 inline-block"><span class="mr-1">📝</span>${item.note}</p>` : '';

                            html += `<div class="invoice-card group ${item.everBlacklisted ? 'border-zinc-800 border-l-[8px]' : ''}"><div class="invoice-content-wrapper"><button onclick="db.collection(COLL).doc('${item.id}').update({completed: ${!item.completed}})" class="w-10 h-10 min-w-[40px] rounded-full border-2 flex items-center justify-center transition-all mt-0.5 ${item.completed ? 'bg-green-500 text-white border-green-500' : 'border-slate-300 text-slate-300 hover:border-slate-400'}">${item.completed ? '✓' : ''}</button><div class="invoice-text-section"><span class="invoice-name ${item.completed ? 'line-through opacity-40 text-slate-400' : ''}">${item.name}</span>${noteHtml}<p class="text-[9px] font-bold text-slate-400 uppercase mt-2">${item.pharmacy}</p></div><div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity shrink-0"><button onclick="addToBlacklist('${item.id}')" class="p-2 bg-zinc-100 text-zinc-600 rounded-lg hover:bg-zinc-800 hover:text-white transition-colors" title="Thêm vào danh sách đen">📓</button><button onclick="openEditForm('${item.id}')" class="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100" title="Chỉnh sửa">✏️</button><button onclick="deleteOne('${item.id}')" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100" title="Xóa">🗑️</button></div></div></div>`;
                        });
                        html += `</div></div>`;
                    }); html += `</div>`;
                }); html += `</div>`;
            }); display.innerHTML = html;
        }

        async function cleanupCompleted() { 
            const listToCleanup = allInvoices.filter(i => i.completed === true && i.isDeleted !== true && i.pharmacy === currentPharmacy);
            if (listToCleanup.length === 0) { showToast("Không có hóa đơn nào cần dọn dẹp! ✨"); return; }
            if (confirm(`Dọn dẹp ${listToCleanup.length} mục đã xong của ${currentPharmacy}?`)) { 
                try {
                    const batch = db.batch();
                    listToCleanup.forEach(i => { batch.update(db.collection(COLL).doc(i.id), { isDeleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp() }); });
                    await batch.commit(); showToast("Đã dọn dẹp hệ thống! 🧹");
                } catch (e) { showToast("Lỗi dọn dẹp! ❌"); }
            } 
        }

        function togglePharmacy(name, tid) { 
            currentPharmacy = name; 
            ['tabTueThien', 'tabHungThinh', 'tabPhucAn'].forEach(id => document.getElementById(id).classList.remove('active')); 
            document.getElementById('tab' + tid).classList.add('active'); 
            
            // Cập nhật biến CSS theo nhà thuốc
            const root = document.documentElement;
            if (tid === 'TueThien') { root.style.setProperty('--theme-color', '#2563eb'); } // Xanh dương
            else if (tid === 'HungThinh') { root.style.setProperty('--theme-color', '#059669'); } // Xanh lá
            else if (tid === 'PhucAn') { root.style.setProperty('--theme-color', '#db2777'); } // Hồng
            
            applyFilters(); 
        }
        
        function changeFilter(type) { 
            currentFilter = type;
            const btnAll = document.getElementById('filterAll');
            const btnUn = document.getElementById('filterUncompleted');
            if(type === 'all') {
                btnAll.className = "px-6 py-3 text-xs font-900 rounded-2xl bg-slate-800 text-white shadow-lg uppercase transition-all";
                btnUn.className = "px-6 py-3 text-xs font-900 rounded-2xl text-slate-400 uppercase transition-all hover:text-slate-700";
            } else {
                btnUn.className = "px-6 py-3 text-xs font-900 rounded-2xl bg-slate-800 text-white shadow-lg uppercase transition-all";
                btnAll.className = "px-6 py-3 text-xs font-900 rounded-2xl text-slate-400 uppercase transition-all hover:text-slate-700";
            }
            applyFilters(); 
        }

        function openAddForm() { 
            document.getElementById('formId').value = ''; 
            document.getElementById('formName').value = ''; 
            document.getElementById('formLink').value = ''; 
            document.getElementById('formNote').value = ''; 
            document.getElementById('formDate').value = new Date().toISOString().split('T')[0]; 
            document.getElementById('modalOverlay').classList.replace('hidden', 'flex'); 
        }
        
        function openEditForm(id) { 
            const i = allInvoices.find(it => it.id === id); 
            document.getElementById('formId').value = i.id; 
            document.getElementById('formName').value = i.name; 
            document.getElementById('formDate').value = i.date; 
            document.getElementById('formLink').value = i.link || ''; 
            document.getElementById('formNote').value = i.note || ''; 
            document.getElementById('modalOverlay').classList.replace('hidden', 'flex'); 
        }
        
        function closeModal() { document.getElementById('modalOverlay').classList.replace('flex', 'hidden'); }

        function toggleBlacklistModal(e) { 
            const m = document.getElementById('blacklistModal'); 
            if (e && e.target.id !== 'blacklistModal' && !e.target.closest('button[title="Danh Sách Đen"]')) return; 
            if (m.classList.contains('hidden')) { m.classList.replace('hidden', 'flex'); renderBlacklist(); } else m.classList.replace('flex', 'hidden'); 
        }

        function toggleRecycleBinModal(e) { 
            const m = document.getElementById('recycleModal'); 
            if (e && e.target.id !== 'recycleModal' && !e.target.closest('button[title="Thùng rác"]')) return; 
            if (m.classList.contains('hidden')) { 
                m.classList.replace('hidden', 'flex'); 
                db.collection(COLL).where('isDeleted', '==', true).orderBy('deletedAt', 'desc').limit(30).get().then(s => { 
                    document.getElementById('recycleDisplay').innerHTML = s.docs.map(doc => `
                        <div class="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl mb-2">
                            <div class="flex flex-col">
                                <span class="font-bold text-slate-700">${doc.data().name}</span>
                                <span class="text-[10px] text-slate-400">${doc.data().date}</span>
                            </div>
                            <button onclick="restoreItem('${doc.id}')" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg font-bold text-xs hover:bg-blue-200 transition-colors">PHỤC HỒI</button>
                        </div>`).join(''); 
                }); 
            } else m.classList.replace('flex', 'hidden'); 
        }

        async function restoreItem(id) {
            await db.collection(COLL).doc(id).update({ isDeleted: false });
            showToast("Đã phục hồi hóa đơn! 🎁");
            toggleRecycleBinModal(); 
        }

        function showToast(msg) { 
            const c = document.getElementById('toastContainer'); const id = Date.now(); 
            // Toast đồng bộ màu với theme
            c.insertAdjacentHTML('beforeend', `<div id="${id}" class="text-white px-6 py-4 rounded-2xl shadow-xl font-bold transition-all" style="background-color: var(--theme-color);">${msg}</div>`); 
            setTimeout(() => document.getElementById(id)?.remove(), 3000); 
        }
        
        function closeForm(e) { if(e.target.id === 'modalOverlay') closeModal(); }

        async function exportUncompletedToExcel() {
            const data = allInvoices.filter(i => !i.completed && i.isDeleted !== true);
            if (!data.length) { showToast("Không có dữ liệu! ✨"); return; }
            const ws = XLSX.utils.json_to_sheet(data.map(i => ({"Ngày": i.date, "Nhà Thuốc": i.pharmacy, "Nhà Cung Cấp": i.name, "Ghi chú": i.note || "", "Link": i.link || "" })));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "HOA DON");
            XLSX.writeFile(wb, `HOA_DON_TONG_HOP_2026.xlsx`);
            showToast("Đã xuất file tổng hợp! 📊");
        }

        window.onload = () => { 
            setTimeout(() => { document.getElementById('loadingIndicator').classList.add('hidden'); loadData(); }, 1000); 
        };
    </script>
</body>
</html>
