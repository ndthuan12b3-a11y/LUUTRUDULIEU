<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Hóa Đơn - 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --smooth: cubic-bezier(0.4, 0, 0.2, 1); 
            --theme-color: #60a5fa; /* Màu nhấn sáng hơn để nổi trên nền tối */
            
            /* Các mảng màu để phối (Mesh Gradient) - Đậm hơn để chữ trắng nổi bật */
            --c1: #0f172a; 
            --c2: #1e3a8a; 
            --c3: #4c1d95; 
            --c4: #0891b2; 
        }
        
        body { 
            background: transparent; 
            font-family: 'Inter', sans-serif; 
            color: #ffffff; /* Toàn bộ chữ mặc định màu trắng */
            overflow-x: hidden; 
        }

        .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* NỀN ẢO DIỆU (LIQUID MESH GRADIENT) */
        #liquid-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background-color: var(--c1);
            overflow: hidden;
            transition: background-color 1.5s ease;
        }
        
        .color-blob {
            position: absolute;
            filter: blur(100px);
            border-radius: 50%;
            animation: float 20s infinite alternate ease-in-out;
            opacity: 0.9;
            transition: background-color 1.5s ease;
            pointer-events: none;
        }
        
        .blob-1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background-color: var(--c2); animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background-color: var(--c3); animation-delay: -5s; }
        .blob-3 { top: 30%; left: 30%; width: 50vw; height: 50vw; background-color: var(--c4); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(15%, -15%) scale(1.1) rotate(10deg); }
            66% { transform: translate(-10%, 15%) scale(0.9) rotate(-5deg); }
            100% { transform: translate(5%, 5%) scale(1.05) rotate(5deg); }
        }

        .app-gradient { background: transparent; position: relative; }

        /* TAB KÍNH MỜ */
        .tab-btn { font-weight: 500; color: rgba(255,255,255,0.5); transition: all 0.4s var(--smooth); }
        .tab-btn.active { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 16px; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); font-weight: 700; color: #fff !important; border: 1px solid rgba(255,255,255,0.2); }
        
        /* GIAO DIỆN TRONG SUỐT (ULTRA GLASSMORPHISM) */
        .luxury-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(30px); 
            border-radius: 2.5rem; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 30px 80px -10px rgba(0, 0, 0, 0.3); 
        }

        .link-batch-box { background: transparent; border: none; padding: 1rem 0; margin-bottom: 2rem; position: relative; transition: all 0.3s; }
        .link-batch-box::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--theme-color); border-radius: 4px; opacity: 0.8;}
        
        .invoice-card { background: transparent; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 1.25rem; width: 100%; display: flex; align-items: flex-start; transition: all 0.3s var(--smooth); }
        .invoice-card:hover { background: rgba(255,255,255,0.05); border-radius: 16px; border-bottom-color: transparent; transform: scale(1.01); }
        .invoice-content-wrapper { display: flex; align-items: flex-start; gap: 1.25rem; width: 100%; }
        .invoice-text-section { flex: 1; min-width: 0; }
        
        .invoice-name { font-size: 18px; font-weight: 600; word-break: break-word; overflow-wrap: break-word; line-height: 1.4; color: #ffffff; display: block; cursor: pointer; transition: all 0.2s ease; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .invoice-name:hover { color: var(--theme-color); }
        
        .btn-add { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: all 0.4s ease; color: #fff; }
        .btn-add:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); transform: scale(1.1) rotate(10deg); }

        .dash-item { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: all 0.3s; }
        
        /* Modal & Form trong suốt */
        .glass-modal { background: rgba(10, 10, 10, 0.5); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; transition: all 0.3s; }
        .glass-input:focus { background: rgba(255,255,255,0.1); border-color: var(--theme-color); outline: none; }
        .glass-input::placeholder { color: rgba(255,255,255,0.3); }
        /* Tùy chỉnh icon lịch của input date */
        ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; cursor: pointer; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

            <button onclick="toggleRecycleBinModal();" class="w-14 h-14 glass-input rounded-2xl flex items-center justify-center hover:bg-white/20 transition-all text-xl backdrop-blur-xl">🗑️</button>

                <button onclick="toggleRecycleBinModal()" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full text-white/50 hover:bg-white/20 hover:text-white transition-colors text-lg">✕</button>
            </div>
            <div id="recycleDisplay" class="flex-1 overflow-y-auto space-y-3 px-1 custom-scrollbar"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC737M2y1nwrGP48rEQ8dVhpV4DwUkysg", authDomain: "duanluutrunew.firebaseapp.com", projectId: "duanluutrunew", storageBucket: "duanluutrunew.appspot.com", messagingSenderId: "1008741702165", appId: "1:1008741702165:web:7e81901f4aac66cb9a0c1c" };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.firestore(); 
        const COLL = 'medx_invoices'; 
        
        let currentPharmacy = 'NT Tuệ Thiện', currentFilter = 'all', allInvoices = [], unsub = null; 
        let hasShownAlert = false; 

        function removeVietnameseTones(str) {
            if(!str) return "";
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|ã|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            return str;
        }

        function getBlacklist(data) { return data.filter(item => item.everBlacklisted === true); }

        async function addToBlacklist(id) { 
            const item = allInvoices.find(i => i.id === id);
            if(confirm(item.everBlacklisted ? "Gỡ khỏi Danh Sách Đen?" : "Đưa vào Danh Sách Đen?")) { 
                await db.collection(COLL).doc(id).update({ everBlacklisted: !item.everBlacklisted }); 
                showToast("Cập nhật Danh Sách Đen! 🚫"); 
            } 
        }

        function updateBlacklistBadge(data) { 
            const list = getBlacklist(data); 
            const b = document.getElementById('blacklistBadge'); 
            if (list.length > 0) { b.innerText = list.length; b.classList.remove('hidden'); } else b.classList.add('hidden'); 
        }

        function renderBlacklist() { 
            const area = document.getElementById('blacklistDisplay'); const list = getBlacklist(allInvoices); 
            if (!list.length) { area.innerHTML = '<p class="text-center py-10 text-white/40 font-medium">Trống ✨</p>'; return; } 
            area.innerHTML = list.map(item => `<div class="flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-xl mb-3"><div class="flex-1"><p class="font-bold text-red-400 text-[16px] drop-shadow-md">${item.name}</p><p class="text-[11px] text-white/50 mt-1 uppercase tracking-wider">${item.date}</p></div><div class="flex gap-2"><button onclick="addToBlacklist('${item.id}')" class="p-2.5 bg-white/10 text-white/80 rounded-lg hover:bg-white/20 transition-colors">🔓</button></div></div>`).join(''); 
        }

        function loadData() { 
            if (unsub) unsub(); 
            unsub = db.collection(COLL)
                .where('date', '>=', '2025-01-01')
                .orderBy('date', 'desc')
                .onSnapshot(snap => { 
                    allInvoices = []; 
                    snap.forEach(doc => allInvoices.push({ id: doc.id, ...doc.data() })); 
                    
                    allInvoices.sort((a, b) => {
                        if (b.date !== a.date) return b.date.localeCompare(a.date);
                        return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    });
                    applyFilters(); 
                    
                    if (!hasShownAlert) { checkOverdueInvoices(); }
                    if (!document.getElementById('blacklistModal').classList.contains('hidden')) renderBlacklist(); 
                }); 
        }

        function checkOverdueInvoices() {
            const today = new Date(); today.setHours(0,0,0,0);
            const overdueList = allInvoices.filter(i => {
                if (i.completed || i.isDeleted) return false;
                const diff = Math.floor((today - new Date(i.date)) / (1000 * 3600 * 24));
                return diff >= 3;
            });
            if (overdueList.length > 0) {
                document.getElementById('alertList').innerHTML = overdueList.map(i => `<div class="p-3.5 bg-red-500/10 rounded-xl flex justify-between items-center border border-red-500/20"><div class="min-w-0 flex-1"><p class="font-semibold text-white text-[15px] truncate">${i.name}</p><p class="text-[10px] font-bold text-amber-400 mt-1 tracking-wider uppercase">${i.pharmacy} • ${i.date}</p></div><span class="text-red-400 font-bold text-[10px] ml-3 shrink-0 bg-red-500/20 px-2 py-1 rounded border border-red-500/30">TRỄ!</span></div>`).join('');
                document.getElementById('alertModal').classList.replace('hidden', 'flex');
                hasShownAlert = true; 
            }
        }

        async function handleSave() { 
            const id = document.getElementById('formId').value; 
            const rawNames = document.getElementById('formName').value.trim(); 
            const date = document.getElementById('formDate').value; 
            const link = document.getElementById('formLink').value.trim(); 
            const note = document.getElementById('formNote').value.trim();

            if (!rawNames || !date) return; 

            if (id) { 
                await db.collection(COLL).doc(id).update({ name: rawNames, date, link, note }); 
                showToast("Cập nhật thành công! ✅"); 
            } else {
                const nameList = rawNames.split('\n').filter(n => n.trim() !== "");
                const batch = db.batch(); const now = new Date();
                nameList.forEach((name, idx) => {
                    const docRef = db.collection(COLL).doc();
                    const staggeredTime = firebase.firestore.Timestamp.fromDate(new Date(now.getTime() + idx * 1000));
                    batch.set(docRef, { name, date, link, note, pharmacy: currentPharmacy, completed: false, isDeleted: false, everBlacklisted: false, createdAt: staggeredTime });
                });
                await batch.commit(); showToast(`Đã thêm thành công! 📦`);
            } 
            closeModal(); 
        }

        async function deleteOne(id) {
            if(confirm("Đưa hóa đơn này vào thùng rác?")) {
                await db.collection(COLL).doc(id).update({ isDeleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp() });
                showToast("Chuyển vào thùng rác! 🗑️");
            }
        }

        function applyFilters() { 
            const rawSearchVal = document.getElementById('mainSearch').value.toLowerCase();
            const searchVal = removeVietnameseTones(rawSearchVal);
            
            let pData = allInvoices.filter(i => !i.isDeleted && i.pharmacy === currentPharmacy);
            document.getElementById('totalCount').innerText = pData.length;
            document.getElementById('completedCount').innerText = pData.filter(i => i.completed).length;
            document.getElementById('pendingCount').innerText = pData.filter(i => !i.completed).length;

            let filtered = pData;
            if (currentFilter === 'uncompleted') filtered = filtered.filter(i => !i.completed); 
            
            if (rawSearchVal) {
                filtered = filtered.filter(i => {
                    const normalizedName = removeVietnameseTones(i.name.toLowerCase());
                    return normalizedName.includes(searchVal);
                });
            }
            renderInvoices(filtered); 
            updateBlacklistBadge(allInvoices); 
        }

        function renderInvoices(data) {
            const display = document.getElementById('invoiceDisplay');
            if (!data.length) { display.innerHTML = '<p class="text-center py-20 font-medium text-[14px] text-white/40 tracking-widest uppercase">Trống 📭</p>'; return; }
            
            const monthGroups = data.reduce((acc, item) => {
                const d = new Date(item.date);
                const key = `${d.getMonth() + 1}-${d.getFullYear()}`;
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            let html = '';
            Object.keys(monthGroups).forEach(monthKey => {
                html += `<div class="month-block mb-10"><div class="timeline-month-header flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-2xl drop-shadow-md">📅</span><h2 class="text-[20px] font-jakarta font-extrabold text-white tracking-widest drop-shadow-md">${monthKey}</h2></div></div>`;
                const dateGroups = monthGroups[monthKey].reduce((acc, item) => { acc[item.date] = acc[item.date] || []; acc[item.date].push(item); return acc; }, {});
                
                Object.keys(dateGroups).sort((a,b) => new Date(b) - new Date(a)).forEach(dateStr => {
                    const d = new Date(dateStr);
                    html += `<div class="mb-12"><div class="sticky top-[60px] z-10 py-4 flex items-center justify-between mb-4 px-2 backdrop-blur-md bg-white/5 border border-white/10 rounded-2xl shadow-lg"><div class="flex items-center gap-4"><div class="bg-white/10 border border-white/20 rounded-xl p-1.5 text-center min-w-[65px]"><div class="text-[10px] font-bold text-white/60 uppercase tracking-widest mb-0.5">Ngày</div><div class="text-[26px] font-jakarta font-black leading-none text-white drop-shadow-md">${d.getDate()}</div></div><div><p class="text-[16px] font-bold text-white tracking-wide opacity-90">${d.toLocaleDateString('vi-VN', { weekday: 'long' })}</p></div></div></div>`;
                    
                    const linkGroups = dateGroups[dateStr].reduce((acc, item) => {
                        const linkKey = (item.link && item.link.trim() !== "") ? item.link : "no_link";
                        if (!acc[linkKey]) acc[linkKey] = [];
                        acc[linkKey].push(item);
                        return acc;
                    }, {});

                    Object.keys(linkGroups).forEach(linkKey => {
                        const items = linkGroups[linkKey];
                        const isNoLink = linkKey === "no_link";
                        const cCount = items.filter(it => it.completed).length;
                        html += `<div class="link-batch-box ml-2"><div class="flex items-center justify-between mb-4 pb-2 border-b border-white/10"><div class="flex items-center gap-2"><span class="text-xl opacity-80">${isNoLink ? '📦' : '📂'}</span><span class="text-[11px] font-bold uppercase tracking-widest ${isNoLink ? 'text-white/60' : 'text-blue-300 drop-shadow-md'}">${isNoLink ? 'Hóa đơn lẻ' : 'DANH SÁCH '} <span class="ml-2 bg-white/10 text-white/80 px-2 py-0.5 rounded-full text-[10px] border border-white/5">Hóa đơn: ${cCount}/${items.length}</span></span></div></div><div class="space-y-1">`;
                        
                        items.forEach(item => {
                            const noteHtml = item.note ? `<p class="text-[13px] text-white/70 font-medium mt-2.5 bg-white/5 px-3 py-2 rounded-lg border border-white/10 inline-block w-full backdrop-blur-sm"><span class="mr-1 opacity-70">📝</span>${item.note}</p>` : '';

                            html += `<div class="invoice-card group ${item.everBlacklisted ? 'border-l-[4px] border-l-red-500 bg-red-500/5' : ''}"><div class="invoice-content-wrapper"><button onclick="db.collection(COLL).doc('${item.id}').update({completed: ${!item.completed}})" class="w-10 h-10 min-w-[40px] rounded-full border flex items-center justify-center transition-all mt-0.5 text-lg ${item.completed ? 'bg-green-500/80 border-green-400 text-white shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'bg-white/5 border-white/20 text-white/30 hover:border-white/50 hover:bg-white/10'}">${item.completed ? '✓' : ''}</button><div class="invoice-text-section"><span onclick="openEditForm('${item.id}')" title="Nhấn để chỉnh sửa" class="invoice-name ${item.completed ? 'line-through opacity-40 hover:opacity-80' : ''}">${item.name}</span>${noteHtml}<p class="text-[10px] font-bold text-white/40 uppercase tracking-widest mt-2">${item.pharmacy}</p></div><div class="flex items-center gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity shrink-0"><button onclick="addToBlacklist('${item.id}')" class="p-2 bg-white/10 border border-white/10 text-white/70 rounded-xl hover:bg-white/20 hover:text-white transition-colors" title="Thêm vào danh sách đen">🚫</button><button onclick="deleteOne('${item.id}')" class="p-2 bg-white/10 border border-white/10 text-red-400 rounded-xl hover:bg-red-500/20 hover:text-red-300 transition-colors" title="Xóa">🗑️</button></div></div></div>`;
                        });
                        html += `</div></div>`;
                    }); html += `</div>`;
                }); html += `</div>`;
            }); display.innerHTML = html;
        }

        function showListModal(type) {
            const m = document.getElementById('listModal');
            const title = document.getElementById('listModalTitle');
            const display = document.getElementById('listDisplay');

            let data = allInvoices.filter(i => !i.isDeleted && i.pharmacy === currentPharmacy);

            if (type === 'completed') {
                data = data.filter(i => i.completed);
                title.innerHTML = `Đã Xong <span class="opacity-50 text-[14px] lowercase ml-2 font-normal">${currentPharmacy}</span>`;
            } else if (type === 'pending') {
                data = data.filter(i => !i.completed);
                title.innerHTML = `Còn Lại <span class="opacity-50 text-[14px] lowercase ml-2 font-normal">${currentPharmacy}</span>`;
            } else {
                title.innerHTML = `Tổng Hóa Đơn <span class="opacity-50 text-[14px] lowercase ml-2 font-normal">${currentPharmacy}</span>`;
            }

            if (!data.length) {
                display.innerHTML = '<p class="text-center py-10 text-white/40 font-medium tracking-widest uppercase text-[12px]">Trống ✨</p>';
            } else {
                display.innerHTML = data.map(item => {
                    const nameHtml = item.link 
                        ? `<a href="${item.link}" target="_blank" title="Mở file hóa đơn" class="font-bold text-blue-300 hover:text-blue-100 hover:underline text-[16px] drop-shadow-md ${item.completed ? 'line-through opacity-60' : ''}">${item.name} ↗</a>`
                        : `<span class="font-bold text-white text-[16px] drop-shadow-md ${item.completed ? 'line-through opacity-60' : ''}">${item.name}</span>`;

                    return `
                    <div class="flex flex-col p-4 bg-white/5 border border-white/10 rounded-xl mb-3 hover:bg-white/10 transition-colors ${item.completed ? 'opacity-70' : ''}">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex-1 break-words">
                                ${nameHtml}
                            </div>
                            <span class="text-[10px] font-bold ${item.completed ? 'text-green-400 bg-green-500/10 border-green-500/20' : 'text-orange-400 bg-orange-500/10 border-orange-500/20'} border px-2 py-1 rounded uppercase tracking-widest shrink-0 mt-0.5">
                                ${item.completed ? '✓ Đã xong' : '⏳ Còn lại'}
                            </span>
                        </div>
                        <div class="flex items-center mt-2 opacity-70">
                            <span class="text-[12px] font-medium text-white flex items-center gap-1 uppercase tracking-wider">📅 ${item.date}</span>
                        </div>
                        ${item.note ? `<div class="mt-3 text-[13px] text-white/80 bg-white/5 px-3 py-2 rounded-lg border border-white/10"><span class="mr-1 opacity-60">📝</span>${item.note}</div>` : ''}
                    </div>`;
                }).join('');
            }

            m.classList.replace('hidden', 'flex');
        }

        function closeListModal(e) {
            if (e.target.id === 'listModal') {
                document.getElementById('listModal').classList.replace('flex', 'hidden');
            }
        }

        /* HÀM CHUYỂN MÀU NỀN MESH GRADIENT */
        function togglePharmacy(name, tid) { 
            currentPharmacy = name; 
            ['tabTueThien', 'tabHungThinh', 'tabPhucAn'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('active');
            }); 
            
            const activeTab = document.getElementById('tab' + tid);
            activeTab.classList.add('active'); 
            
            const root = document.documentElement;
            // Phối màu nền đậm, sâu thẳm, các blob màu neon rực rỡ để chữ trắng nổi bật
            if (tid === 'TueThien') { 
                root.style.setProperty('--theme-color', '#60a5fa'); 
                root.style.setProperty('--c1', '#0f172a'); // Nền tối slate
                root.style.setProperty('--c2', '#1d4ed8'); // Blue đậm
                root.style.setProperty('--c3', '#6d28d9'); // Tím sâu
                root.style.setProperty('--c4', '#0369a1'); // Cyan sâu
            } 
            else if (tid === 'HungThinh') { 
                root.style.setProperty('--theme-color', '#34d399'); 
                root.style.setProperty('--c1', '#022c22'); // Nền tối green
                root.style.setProperty('--c2', '#047857'); // Emerald đậm
                root.style.setProperty('--c3', '#0369a1'); // Sky đậm
                root.style.setProperty('--c4', '#4d7c0f'); // Lime sâu
            } 
            else if (tid === 'PhucAn') { 
                root.style.setProperty('--theme-color', '#f472b6'); 
                root.style.setProperty('--c1', '#4c0519'); // Nền tối rose
                root.style.setProperty('--c2', '#be123c'); // Rose đậm
                root.style.setProperty('--c3', '#a21caf'); // Fuchsia đậm
                root.style.setProperty('--c4', '#9d174d'); // Pink sâu
            } 
            
            applyFilters(); 
        }
        
        function changeFilter(type) { 
            currentFilter = type;
            const btnAll = document.getElementById('filterAll');
            const btnUn = document.getElementById('filterUncompleted');
            if(type === 'all') {
                btnAll.className = "px-6 py-3 text-[13px] font-bold rounded-xl bg-white/20 text-white shadow-md transition-all tracking-wider";
                btnUn.className = "px-6 py-3 text-[13px] font-bold rounded-xl text-white/50 transition-all hover:bg-white/10 tracking-wider";
            } else {
                btnUn.className = "px-6 py-3 text-[13px] font-bold rounded-xl bg-white/20 text-white shadow-md transition-all tracking-wider";
                btnAll.className = "px-6 py-3 text-[13px] font-bold rounded-xl text-white/50 transition-all hover:bg-white/10 tracking-wider";
            }
            applyFilters(); 
        }

        function openAddForm() { 
            document.getElementById('formId').value = ''; 
            document.getElementById('formName').value = ''; 
            document.getElementById('formLink').value = ''; 
            document.getElementById('formNote').value = ''; 
            document.getElementById('formDate').value = new Date().toISOString().split('T')[0]; 
            document.getElementById('modalOverlay').classList.replace('hidden', 'flex'); 
        }
        
        function openEditForm(id) { 
            const i = allInvoices.find(it => it.id === id); 
            document.getElementById('formId').value = i.id; 
            document.getElementById('formName').value = i.name; 
            document.getElementById('formDate').value = i.date; 
            document.getElementById('formLink').value = i.link || ''; 
            document.getElementById('formNote').value = i.note || ''; 
            document.getElementById('modalOverlay').classList.replace('hidden', 'flex'); 
        }
        
        function closeModal() { document.getElementById('modalOverlay').classList.replace('flex', 'hidden'); }

        function toggleBlacklistModal(e) { 
            const m = document.getElementById('blacklistModal'); 
            if (e && e.target.id !== 'blacklistModal' && !e.target.closest('button[title="Danh Sách Đen"]')) return; 
            if (m.classList.contains('hidden')) { m.classList.replace('hidden', 'flex'); renderBlacklist(); } else m.classList.replace('flex', 'hidden'); 
        }

        function toggleRecycleBinModal(e) { 
            const m = document.getElementById('recycleModal'); 
            if (e && e.target.id !== 'recycleModal' && !e.target.closest('button[title="Thùng rác"]')) return; 
            if (m.classList.contains('hidden')) { 
                m.classList.replace('hidden', 'flex'); 
                db.collection(COLL).where('isDeleted', '==', true).orderBy('deletedAt', 'desc').limit(30).get().then(s => { 
                    document.getElementById('recycleDisplay').innerHTML = s.docs.map(doc => `
                        <div class="flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-xl mb-3">
                            <div class="flex flex-col">
                                <span class="font-bold text-white text-[15px] drop-shadow-sm">${doc.data().name}</span>
                                <span class="text-[11px] text-white/50 mt-1 uppercase tracking-widest">${doc.data().date}</span>
                            </div>
                            <button onclick="restoreItem('${doc.id}')" class="bg-white/10 text-white border border-white/20 px-3 py-1.5 rounded-lg font-bold text-[11px] hover:bg-white/20 transition-colors uppercase tracking-widest">Phục hồi</button>
                        </div>`).join(''); 
                }); 
            } else m.classList.replace('flex', 'hidden'); 
        }

        async function restoreItem(id) {
            await db.collection(COLL).doc(id).update({ isDeleted: false });
            showToast("Đã phục hồi! 🎁");
            toggleRecycleBinModal(); 
        }

        async function cleanupCompleted() { 
            const listToCleanup = allInvoices.filter(i => i.completed === true && i.isDeleted !== true && i.pharmacy === currentPharmacy);
            if (listToCleanup.length === 0) { showToast("Trống! ✨"); return; }
            if (confirm(`Dọn dẹp ${listToCleanup.length} mục đã xong của ${currentPharmacy}?`)) { 
                try {
                    const batch = db.batch();
                    listToCleanup.forEach(i => { batch.update(db.collection(COLL).doc(i.id), { isDeleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp() }); });
                    await batch.commit(); showToast("Đã dọn dẹp! 🧹");
                } catch (e) { showToast("Lỗi dọn dẹp! ❌"); }
            } 
        }

        function showToast(msg) { 
            const c = document.getElementById('toastContainer'); const id = Date.now(); 
            c.insertAdjacentHTML('beforeend', `<div id="${id}" class="text-white px-6 py-4 rounded-xl shadow-2xl font-bold transition-all text-[14px] tracking-wide border border-white/20" style="background-color: rgba(0,0,0,0.7); backdrop-filter: blur(10px);">${msg}</div>`); 
            setTimeout(() => document.getElementById(id)?.remove(), 3000); 
        }
        
        function closeForm(e) { if(e.target.id === 'modalOverlay') closeModal(); }

        async function exportUncompletedToExcel() {
            const data = allInvoices.filter(i => !i.completed && i.isDeleted !== true);
            if (!data.length) { showToast("Trống! ✨"); return; }
            const ws = XLSX.utils.json_to_sheet(data.map(i => ({"Ngày": i.date, "Nhà Thuốc": i.pharmacy, "Nhà Cung Cấp": i.name, "Ghi chú": i.note || "", "Link": i.link || "" })));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "HOA DON");
            XLSX.writeFile(wb, `HOA_DON_TONG_HOP_2026.xlsx`);
            showToast("Đã xuất file! 📊");
        }

        document.addEventListener('keydown', function(e) {
            const isTyping = ['INPUT', 'TEXTAREA'].includes(e.target.tagName);

            if (e.key === 'Escape') {
                e.preventDefault();
                document.getElementById('modalOverlay').classList.replace('flex', 'hidden');
                document.getElementById('blacklistModal').classList.replace('flex', 'hidden');
                document.getElementById('recycleModal').classList.replace('flex', 'hidden');
                document.getElementById('alertModal').classList.replace('flex', 'hidden');
                document.getElementById('listModal').classList.replace('flex', 'hidden'); 
                if (document.activeElement) { document.activeElement.blur(); }
                return;
            }
            if (e.key === 'F2') { e.preventDefault(); openAddForm(); return; }
            if (e.ctrlKey && e.key.toLowerCase() === 'd') { e.preventDefault(); exportUncompletedToExcel(); return; }
            if (e.ctrlKey && e.key.toLowerCase() === 'x') { if (!isTyping) { e.preventDefault(); cleanupCompleted(); return; } }
            if (!isTyping && e.key.toLowerCase() === 'f') { e.preventDefault(); document.getElementById('mainSearch').focus(); return; }

            if (!isTyping && !e.ctrlKey && !e.altKey && !e.metaKey) {
                if (e.key === '1') { e.preventDefault(); togglePharmacy('NT Tuệ Thiện', 'TueThien'); } 
                else if (e.key === '2') { e.preventDefault(); togglePharmacy('NT Hưng Thịnh', 'HungThinh'); } 
                else if (e.key === '3') { e.preventDefault(); togglePharmacy('NT Phúc An', 'PhucAn'); }
            }
        });

        window.onload = () => { 
            setTimeout(() => { 
                document.getElementById('loadingIndicator').classList.add('hidden'); 
                // Kích hoạt màu Tuệ Thiện ban đầu
                document.documentElement.style.setProperty('--c1', '#0f172a');
                document.documentElement.style.setProperty('--c2', '#1d4ed8');
                document.documentElement.style.setProperty('--c3', '#6d28d9');
                document.documentElement.style.setProperty('--c4', '#0369a1');
                loadData(); 
            }, 1000); 
        };
    </script>
</body>
</html>
